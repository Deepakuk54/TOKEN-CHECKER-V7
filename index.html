<!DOCTYPE html>
<html>
<head>
    <title>DEEPAK RAJPUT NUKE PANEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #050505; color: #e0e0e0; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; background: #111; border: 1px solid #ff0000; padding: 25px; border-radius: 10px; box-shadow: 0 0 15px #ff000044; }
        h2 { color: #ff0000; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; box-sizing: border-box; }
        .btn-fire { background: #ff0000; color: #fff; border: none; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .logs { background: #000; border: 1px solid #222; height: 250px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 12px; margin-top: 20px; color: #00ff00; }
        .status { margin-top: 10px; font-weight: bold; color: #ffcc00; }
    </style>
</head>
<body>
    <div class="container">
        <h2><i class="fas fa-radiation"></i> Nuke Panel v7</h2>
        <input type="text" id="target" placeholder="Paste Enemy ID UID or Link">
        <button class="btn-fire" onclick="startNuke()">Launch Mass Report</button>
        <div class="status">Status: <span id="st">Waiting...</span></div>
        <div class="logs" id="logBox">>> System Ready for Deepak Rajput Brand...</div>
    </div>

    <script>
        let tid = null;
        async function startNuke() {
            const uid = document.getElementById('target').value;
            const res = await fetch('/api/nuke', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ targetUID: uid })
            });
            const data = await res.json();
            if(data.success) {
                tid = data.taskId;
                setInterval(updateLogs, 3000);
            } else { alert(data.msg); }
        }

        async function updateLogs() {
            if(!tid) return;
            const res = await fetch('/api/status/' + tid);
            const d = await res.json();
            document.getElementById('st').innerText = d.status;
            document.getElementById('logBox').innerHTML = d.logs.join('<br>');
            document.getElementById('logBox').scrollTop = document.getElementById('logBox').scrollHeight;
        }
    </script>
</body>
</html>
